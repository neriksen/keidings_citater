<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Citater</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>Citater</h1>
      <p class="sub">Et tilfældigt citat fra en mikroøkonomi-forelæsning</p>
    </header>

    <nav class="mode-switch" role="radiogroup" aria-label="Vælg kilde">
      <button type="button" class="mode-btn" data-mode="both" role="radio" aria-checked="true">Begge</button>
      <button type="button" class="mode-btn" data-mode="original" role="radio" aria-checked="false">Autentiske</button>
      <button type="button" class="mode-btn" data-mode="ai" role="radio" aria-checked="false">AI</button>
    </nav>

    <article id="quote-card">
      <blockquote id="quote-text">Indlæser…</blockquote>
      <div class="meta" id="quote-source"></div>
    </article>

    <div class="counter" id="quote-counter" aria-live="polite"></div>

    <button id="next-btn" type="button">Næste citat</button>
    <p class="hint">mellemrum eller pil-højre</p>

    <footer>
      <p>Citaterne stammer enten fra forelæsninger i mikroøkonomi eller er genereret i samme stil af en sprogmodel.</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
