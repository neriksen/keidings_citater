<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Citater</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>Citater</h1>
      <p class="sub">Et tilfældigt citat fra en mikroøkonomi-forelæsning</p>
    </header>

    <article id="quote-card">
      <blockquote id="quote-text">Indlæser…</blockquote>
      <div class="meta">
        <span id="quote-source"></span>
      </div>
    </article>

    <button id="next-btn" type="button">Næste citat</button>

    <footer>
      <p>Citaterne stammer enten fra forelæsninger i mikroøkonomi eller er genereret i samme stil af en sprogmodel.</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
